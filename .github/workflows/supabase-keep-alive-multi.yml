name: Supabase Keep Alive (Multi-Project)

# ---------------------------------------------------------------------
# 여러 Supabase 프로젝트를 하나의 워크플로로 keep-alive
# 프로젝트 목록은 SUPABASE_PROJECTS 시크릿(JSON 배열)에 저장
# 추가/삭제 시 이 파일은 수정 불필요 — 시크릿만 편집하면 됨
# ---------------------------------------------------------------------
on:
  schedule:
    - cron: "0 6 * * 1,4"   # 매주 월·목 06:00 UTC (한국시간 15:00)
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # heartbeat 파일 커밋/푸시(저장소 활동 갱신)에 필요
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ping all Supabase projects
        env:
          # 형식 예시(줄바꿈 없이 한 줄로 저장해도 됨):
          # [
          #   {"name":"solar-agri","url":"https://aaa.supabase.co","key":"service_role_key_1"},
          #   {"name":"dream-bridge","url":"https://bbb.supabase.co","key":"service_role_key_2"}
          # ]
          SUPABASE_PROJECTS: ${{ secrets.SUPABASE_PROJECTS }}
        run: |
          # GitHub는 셸을 'bash -e {0}'로 강제 실행하므로 errexit를 명시적으로 끈다.
          # (안 그러면 한 프로젝트의 curl 실패 시 스크립트 전체가 중단되어 나머지가 ping 안 됨)
          set +e
          set -uo pipefail

          # --- 시크릿 유효성 먼저 검증 ---
          if [ -z "${SUPABASE_PROJECTS:-}" ]; then
            echo "::error::SUPABASE_PROJECTS 시크릿이 비어있거나 설정되지 않았습니다."
            exit 1
          fi
          if ! echo "${SUPABASE_PROJECTS}" | jq -e 'type == "array"' >/dev/null 2>&1; then
            echo "::error::SUPABASE_PROJECTS 가 JSON 배열이 아닙니다. 형식을 확인하세요."
            exit 1
          fi

          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          COUNT=$(echo "${SUPABASE_PROJECTS}" | jq 'length')
          OK=0
          FAILED=0
          SUMMARY=""   # Step Summary 표 누적

          echo "===================================================="
          echo " Supabase Keep-Alive  |  ${NOW}  |  ${COUNT} project(s)"
          echo "===================================================="

          for i in $(seq 0 $((COUNT - 1))); do
            NAME=$(echo "${SUPABASE_PROJECTS}" | jq -r ".[$i].name // \"(no-name-#$i)\"")
            URL=$(echo "${SUPABASE_PROJECTS}"  | jq -r ".[$i].url  // empty")
            KEY=$(echo "${SUPABASE_PROJECTS}"  | jq -r ".[$i].key  // empty")

            echo "::group::${NAME}"

            # url/key 누락 사전 차단 (설정 실수 즉시 진단)
            if [ -z "${URL}" ] || [ -z "${KEY}" ]; then
              REASON="설정오류: url 또는 key 누락"
              echo "  [FAIL] ${NAME} -> ${REASON}"
              echo "::error::[${NAME}] ${REASON}"
              SUMMARY="${SUMMARY}| ${NAME} | ❌ | - | - | ${REASON} |"$'\n'
              FAILED=$((FAILED + 1))
              echo "::endgroup::"
              continue
            fi

            # upsert(POST + merge-duplicates): id=1 행이 없으면 생성, 있으면 갱신.
            # return=representation 으로 실제 써진 행을 돌려받아 no-op(0건)까지 검증.
            : > /tmp/resp.txt   # 직전 프로젝트 응답 잔여 방지(연결 실패 시 curl이 파일을 안 씀)
            HTTP_CODE=$(curl -s -m 20 -o /tmp/resp.txt -w "%{http_code}" \
              -X POST "${URL}/rest/v1/keep_alive" \
              -H "apikey: ${KEY}" \
              -H "Authorization: Bearer ${KEY}" \
              -H "Content-Type: application/json" \
              -H "Prefer: resolution=merge-duplicates,return=representation" \
              -d "{\"id\": 1, \"last_ping\": \"${NOW}\"}")
            HTTP_CODE=${HTTP_CODE:-000}   # curl 자체 실행 실패(바이너리 부재 등) 대비 기본값

            # 응답이 JSON 배열일 때만 행 수/last_ping 추출 (에러 응답 오판 방지)
            ROWS=$(jq 'if type == "array" then length else 0 end' /tmp/resp.txt 2>/dev/null || echo 0)
            WROTE=$(jq -r 'if type == "array" and length > 0 then .[0].last_ping else "n/a" end' /tmp/resp.txt 2>/dev/null || echo "n/a")
            BODY=$(head -c 300 /tmp/resp.txt 2>/dev/null | tr '\n' ' ')

            if [ "${HTTP_CODE}" -ge 200 ] && [ "${HTTP_CODE}" -lt 300 ] && [ "${ROWS}" -ge 1 ]; then
              echo "  [OK]   ${NAME}  HTTP ${HTTP_CODE}  rows=${ROWS}  last_ping=${WROTE}"
              SUMMARY="${SUMMARY}| ${NAME} | ✅ | ${HTTP_CODE} | ${ROWS} | last_ping=${WROTE} |"$'\n'
              OK=$((OK + 1))
            else
              # 실패 원인 분류 (정확한 진단)
              case "${HTTP_CODE}" in
                000)         REASON="네트워크/DNS 실패 또는 타임아웃 (url 확인)";;
                401|403)     REASON="인증 실패 (service_role key 만료/오류)";;
                404)         REASON="404: keep_alive 테이블 없음 또는 url 오류";;
                2*|3*)       REASON="성공응답이나 write 0건 (id=1 upsert 실패 — PK/unique 확인)";;
                *)           REASON="HTTP ${HTTP_CODE} 오류";;
              esac
              echo "  [FAIL] ${NAME}  HTTP ${HTTP_CODE}  rows=${ROWS}  -> ${REASON}"
              echo "         resp: ${BODY}"
              echo "::error::[${NAME}] ${REASON} (HTTP ${HTTP_CODE}) ${BODY}"
              SUMMARY="${SUMMARY}| ${NAME} | ❌ | ${HTTP_CODE} | ${ROWS} | ${REASON} |"$'\n'
              FAILED=$((FAILED + 1))
            fi
            echo "::endgroup::"
          done

          echo "===================================================="
          echo " 결과: OK ${OK} / FAIL ${FAILED} / 총 ${COUNT}"
          echo "===================================================="

          # ---- Actions 실행 요약 화면(Step Summary)에 표로 출력 ----
          {
            echo "### Supabase Keep-Alive 결과"
            echo ""
            echo "- 시각(UTC): \`${NOW}\`"
            echo "- 성공 **${OK}** / 실패 **${FAILED}** / 총 **${COUNT}**"
            echo ""
            echo "| 프로젝트 | 상태 | HTTP | rows | 비고 |"
            echo "|---|:---:|:---:|:---:|---|"
            printf "%s" "${SUMMARY}"
          } >> "${GITHUB_STEP_SUMMARY:-/dev/null}"

          if [ "${FAILED}" -ne 0 ]; then
            echo "::error::${FAILED}개 프로젝트의 keep-alive ping 실패 — 위 로그/요약 참고"
            exit 1
          fi

          echo "모든 keep-alive ping 성공 (${OK}/${COUNT})"

      # GitHub는 저장소 활동이 60일간 없으면 schedule 트리거를 자동 비활성화한다.
      # 매 실행마다 heartbeat 파일을 커밋/푸시해 저장소를 항상 활성 상태로 유지.
      # ping 실패로 앞 스텝이 exit 1 되어도 반드시 실행되도록 if: always().
      - name: Keep repository active (prevent 60-day auto-disable)
        if: always()
        run: |
          set -euo pipefail
          STAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "last keep-alive run (UTC): ${STAMP}" > keepalive-heartbeat.txt

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add keepalive-heartbeat.txt

          if git diff --cached --quiet; then
            echo "heartbeat 변경 없음 — 커밋 생략"
          else
            git commit -m "chore: keep-alive heartbeat ${STAMP} [skip ci]"
            git push
            echo "heartbeat 커밋/푸시 완료 (${STAMP})"
          fi
